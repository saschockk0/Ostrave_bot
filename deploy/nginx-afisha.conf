# Mini App-афиша (webapp/) на прод-сервере: статика из /var/www/afisha,
# приём заявок — в бота на 127.0.0.1:8081 (services/webapi.py).
#
# Эти блоки вставляются в server{} с HTTPS-сертификатом (у нас — сайт `ostrov`,
# домен pkostrov.ru) ВЫШЕ, чем `location /`. Порядок в файле не важен —
# nginx выбирает самый длинный совпавший префикс, — но так конфиг читается легче.
#
# Обновление статики: npm run build в webapp/ и
#   scp -r webapp/dist/* root@<сервер>:/var/www/afisha/

# Без слэша путь не попал бы в /afisha/ и уехал бы на основной сайт.
location = /afisha {
    return 301 /afisha/;
}

# Заявки из афиши: подпись initData проверяет сам бот.
location /afisha/api/ {
    proxy_pass         http://127.0.0.1:8081/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
}

# Файлы сборки хешированы по содержимому — можно кэшировать надолго.
location /afisha/assets/ {
    root /var/www;
    expires 1y;
    add_header Cache-Control "public, immutable";
}

# А вот index.html кэшировать нельзя, иначе после деплоя Telegram будет
# открывать старую сборку.
location /afisha/ {
    root /var/www;
    try_files $uri $uri/ /afisha/index.html;
    add_header Cache-Control "no-cache";
}
